<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Watch</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    #video-container {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    #main-video {
      width: 100%;
      height: 100%;
      object-fit: cover;   /* fills screen, crops edges like a reel */
      object-position: center;
      display: block;
    }

    /* ── Mute button ── */
    #mute-btn {
      position: fixed;
      bottom: max(28px, env(safe-area-inset-bottom, 28px));
      right: 20px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s ease, background 0.15s ease;
      -webkit-tap-highlight-color: transparent;
      z-index: 10;
    }
    #mute-btn:active { transform: scale(0.88); background: rgba(255,255,255,0.18); }

    #mute-btn svg {
      width: 22px;
      height: 22px;
      fill: #fff;
      display: block;
    }

    /* ── Tap-to-play overlay (shown when browser blocks autoplay) ── */
    #tap-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      cursor: pointer;
      z-index: 20;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    #tap-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }
    #tap-overlay .play-icon {
      width: 72px; height: 72px;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      animation: pulse 1.8s ease-in-out infinite;
    }
    #tap-overlay .play-icon svg { width: 34px; height: 34px; fill: #fff; margin-left: 4px; }
    #tap-overlay p { color: rgba(255,255,255,0.85); font-size: 15px; letter-spacing: 0.02em; }

    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,255,255,0.3); }
      50%       { transform: scale(1.06); box-shadow: 0 0 0 16px rgba(255,255,255,0); }
    }

    /* ── Loading spinner ── */
    #loader {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 30;
      transition: opacity 0.5s ease;
    }
    #loader.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- Loading screen -->
  <div id="loader"><div class="spinner"></div></div>

  <!-- Video -->
  <div id="video-container">
    <!--
      ╔══════════════════════════════════════════════════════╗
      ║  REPLACE  src="your-video.mp4"  with your video URL  ║
      ║  or upload your .mp4 and set the correct filename.   ║
      ╚══════════════════════════════════════════════════════╝
    -->
    <video
      id="main-video"
      src="meme.mp4"
      playsinline
      webkit-playsinline
      loop
      muted
      preload="auto"
    ></video>
  </div>

  <!-- Mute / Unmute button -->
  <button id="mute-btn" aria-label="Toggle sound">
    <!-- Speaker-muted icon (shown when muted) -->
    <svg id="icon-muted" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M3.63 3.63a1 1 0 0 0-1.41 1.41L7.29 10.1 7 10.38V14h2v-.59l2 2V19l-4-4H4a1 1 0 0 1-1-1v-4a1 1 0 0 1 1-1h.17L2.22 7.05a1 1 0 0 0 1.41 1.41zM7 8.41l5-5V3l-3.73 3.73L7 8.41zM19.07 4.93a1 1 0 0 0-1.41 1.41A8.94 8.94 0 0 1 20 12a8.93 8.93 0 0 1-2.35 6l1.42 1.42A10.93 10.93 0 0 0 22 12a10.93 10.93 0 0 0-2.93-7.07zM16.24 7.76a1 1 0 0 0-1.41 1.41A5 5 0 0 1 16.29 14l1.5 1.5A7 7 0 0 0 19 12a7 7 0 0 0-2.76-4.24z"/>
    </svg>
    <!-- Speaker icon (shown when unmuted) -->
    <svg id="icon-sound" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="display:none">
      <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
    </svg>
  </button>

  <!-- Tap-to-play overlay (fallback) -->
  <div id="tap-overlay">
    <div class="play-icon">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </div>
    <p>Tap to play</p>
  </div>

  <script>
    const video      = document.getElementById('main-video');
    const muteBtn    = document.getElementById('mute-btn');
    const iconMuted  = document.getElementById('icon-muted');
    const iconSound  = document.getElementById('icon-sound');
    const tapOverlay = document.getElementById('tap-overlay');
    const loader     = document.getElementById('loader');

    /* ── Loader: hide once video can play ── */
    video.addEventListener('canplay', () => loader.classList.add('hidden'), { once: true });
    setTimeout(() => loader.classList.add('hidden'), 4000); // safety timeout

    /* ── Autoplay (muted) on load ── */
    function tryAutoplay() {
      video.muted = true;
      video.play().then(() => {
        tapOverlay.classList.remove('visible');
      }).catch(() => {
        tapOverlay.classList.add('visible');
      });
    }
    tryAutoplay();

    /* ── Tap overlay → start playback ── */
    tapOverlay.addEventListener('click', () => {
      video.play().then(() => tapOverlay.classList.remove('visible'));
    });

    /* ── Mute / Unmute toggle ── */
    function updateMuteUI() {
      if (video.muted) {
        iconMuted.style.display = 'block';
        iconSound.style.display = 'none';
      } else {
        iconMuted.style.display = 'none';
        iconSound.style.display = 'block';
      }
    }

    muteBtn.addEventListener('click', () => {
      video.muted = !video.muted;
      // If unmuting and video was paused, try to play
      if (!video.muted && video.paused) video.play();
      updateMuteUI();
    });

    updateMuteUI();

    /* ── Keep video filling screen on resize ── */
    function sizeVideo() {
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      // object-fit:cover handles it natively — just ensure 100vw/vh
      video.style.width  = vw + 'px';
      video.style.height = vh + 'px';
    }
    window.addEventListener('resize', sizeVideo);
    sizeVideo();
  </script>
</body>
</html>
