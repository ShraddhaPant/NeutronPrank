<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Watch</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
    }

    #video-container {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    #main-video {
      width: 100%;
      height: 100%;
      object-fit: contain;   /* full video visible, no cropping */
      object-position: center;
      display: block;
    }

    /* Mute button */
    #mute-btn {
      position: fixed;
      bottom: max(28px, env(safe-area-inset-bottom, 28px));
      right: 20px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1.5px solid rgba(255,255,255,0.2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s ease;
      -webkit-tap-highlight-color: transparent;
      z-index: 10;
    }
    #mute-btn:active { transform: scale(0.88); }
    #mute-btn svg { width: 24px; height: 24px; fill: #fff; display: block; }

    /* Tap-to-play overlay */
    #tap-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      cursor: pointer;
      z-index: 20;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    #tap-overlay.visible { opacity: 1; pointer-events: all; }
    .play-circle {
      width: 76px; height: 76px;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      animation: pulse 1.8s ease-in-out infinite;
    }
    .play-circle svg { width: 36px; height: 36px; fill: #fff; margin-left: 5px; }
    #tap-overlay p { color: rgba(255,255,255,0.8); font-size: 15px; font-family: -apple-system, sans-serif; }

    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,255,255,0.25); }
      50%       { transform: scale(1.07); box-shadow: 0 0 0 18px rgba(255,255,255,0); }
    }

    /* Loader */
    #loader {
      position: fixed; inset: 0;
      background: #000;
      display: flex; align-items: center; justify-content: center;
      z-index: 30;
      transition: opacity 0.4s ease;
    }
    #loader.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.12);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="loader"><div class="spinner"></div></div>

  <div id="video-container">
    <video
      id="main-video"
      src="meme.mp4"
      playsinline
      webkit-playsinline
      loop
      muted
      preload="auto"
    ></video>
  </div>

  <button id="mute-btn" aria-label="Toggle sound">
    <svg id="icon-muted" viewBox="0 0 24 24"><path d="M16.5 12A4.5 4.5 0 0 0 14 7.97v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06A8.99 8.99 0 0 0 17.73 18l1.73 1.73L21 18.27l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
    <svg id="icon-sound" viewBox="0 0 24 24" style="display:none"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
  </button>

  <div id="tap-overlay">
    <div class="play-circle">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </div>
    <p>Tap to play</p>
  </div>

  <script>
    const video   = document.getElementById('main-video');
    const muteBtn = document.getElementById('mute-btn');
    const iMuted  = document.getElementById('icon-muted');
    const iSound  = document.getElementById('icon-sound');
    const overlay = document.getElementById('tap-overlay');
    const loader  = document.getElementById('loader');

    video.addEventListener('canplay', () => loader.classList.add('hidden'), { once: true });
    setTimeout(() => loader.classList.add('hidden'), 5000);

    video.muted = true;
    video.play().catch(() => overlay.classList.add('visible'));

    overlay.addEventListener('click', () => {
      video.play().then(() => overlay.classList.remove('visible'));
    });

    muteBtn.addEventListener('click', () => {
      video.muted = !video.muted;
      if (!video.muted && video.paused) video.play();
      iMuted.style.display = video.muted ? 'block' : 'none';
      iSound.style.display = video.muted ? 'none'  : 'block';
    });
  </script>
</body>
</html>
